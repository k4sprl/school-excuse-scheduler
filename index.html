<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>School Excuse Scheduler</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser/build/stlite.css" />
    <style>
        body { margin: 0; padding: 0; }
        #root { height: 100vh; width: 100vw; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="module">
        import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser/build/stlite.js";
        
        mount({
            requirements: ["pandas", "requests", "pycountry", "streamlit-calendar"],
            entrypoint: "app.py",
            files: {
                "app.py": {
                    url: "./app.py", 
                }
            }
        }, document.getElementById("root"));
    </script>
</body>
</html>
